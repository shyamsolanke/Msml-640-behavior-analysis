services:
  app:
    build: .
    image: behavior-analysis:latest
    container_name: behavior-analysis
    ports:
      - "8501:8501"
    volumes:
      # Persist weights so they survive container restarts (avoid re-downloading)
      - ./weights:/app/weights
      # Persist demo clip and MOT17 data
      - ./data:/app/data
      # Persist evaluation outputs and tracked videos
      - ./outputs:/app/outputs
    environment:
      # Optional: set OPENAI_API_KEY for LLM summaries (scripts/llm_summaries.py)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    stdin_open: false
    tty: false

